project:
    name: REST API Example
    organization: My Organization
    description: |
      This is a test project against against the JSONPlaceholder public API 
      (https://jsonplaceholder.typicode.com). Some tests will fail on purpose 
      to demostrate the behaviour on failures.
    test-suites:
      - name: Getters
        description: REST API Getters
        tag-expression: GET
      - name: Others
        description: REST API Other Operations
        tag-expression: not GET  

plugins:
    - gherkin
    - rest

configuration:
    core:
        resourceFilter: '**/*.feature'
    rest:
        baseURL: 'https://jsonplaceholder.typicode.com'
        timeout: 10000

profiles:
    dev: {}
    prod: {}
