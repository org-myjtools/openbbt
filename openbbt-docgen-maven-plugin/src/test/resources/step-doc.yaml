'rest.response.statusCode':
  description: |
    Asserts that the status code of the last REST response matches the expected value.
  expressions:
    en: 'the HTTP status code {numeric-assertion}'
    es: 'el código de estado HTTP {numeric-assertion}'
  parameters:
    - name: statusCode
      type: number
      description: The expected HTTP status code of the response
  example: |
    Then the HTTP status code is greater than 200
    

'rest.response.body':
  description: |
    Asserts that the body of the last REST response matches the expected value.
  expressions:
    en: 'the response body is:'
    es: 'el cuerpo de la respuesta es:'
  additional-data:
    document: The expected body of the response, provided as a multi-line text input
  example: |
    Then the response body is:
    ```json
    {
      "id": 123,
      "name": "John",
      "age": 30
    }
    ```

'rest.response.body.file':
  description: |
    Asserts that the body of the last REST response matches the expected value read from a file.
  expressions:
    en: 'the response body is the content of file {file:text}'
    es: 'el cuerpo de la respuesta es el contenido del archivo {file:text}'
  parameters:
    - name: file
      type: text
      description: The path to the file containing the expected body of the response
  example: |
    Then the response body is the content of file "expected_response.json"
    

'rest.response.body.contains':
  description: |
    Asserts that the body of the last REST response contains the expected value.
  expressions:
    en: 'the response body contains:'
    es: 'el cuerpo de la respuesta contiene:'
  additional-data:
    document: The expected content that should be present in the response body, provided as a multi-line text input
  example: |
    Then the response body contains:
    ```json
    {
      "id": 123,
      "name": "John",
    }
    ```