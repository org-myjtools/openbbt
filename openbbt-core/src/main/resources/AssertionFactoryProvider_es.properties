# encoding: UTF-8

# number positive assertions
assertion.number.equals=es (igual a) _
assertion.number.greater=es mayor que _
assertion.number.less=es menor que _
assertion.number.greater.equals=es mayor o igual que _
assertion.number.less.equals=es menor o igual que _

# string positive assertions
assertion.string.equals=es (igual a) _
assertion.string.equals.ignore.case=es (igual a) _ \(ignorando mayusculas\)
assertion.string.equals.ignore.whitespace=es (igual a) _ \(ignorando espacios\)
assertion.string.starts.with=empieza con _
assertion.string.starts.with.ignore.case=empieza con _ \(ignorando mayusculas\)
assertion.string.ends.with=termina con _
assertion.string.ends.with.ignore.case=termina con _ \(ignorando mayusculas\)
assertion.string.contains=contiene _
assertion.string.contains.ignore.case=contiene _ \(ignorando mayusculas\)

assertion.generic.null=es nulo
assertion.generic.empty=esta vacio
assertion.generic.null.empty=es nulo o vacio

# negative assertions
assertion.number.not.equals=no es (igual a) _
assertion.number.not.greater=no es mayor que _
assertion.number.not.less=no es menor que _
assertion.number.not.greater.equals=no es mayor o igual que _
assertion.number.not.less.equals=no es menor o igual que _

assertion.string.not.equals=no es (igual a) _
assertion.string.not.equals.ignore.case=no es (igual a) _ \(ignorando mayusculas\)
assertion.string.not.equals.ignore.whitespace=no es (igual a) _ \(ignorando espacios\)
assertion.string.not.starts.with=no empieza con _
assertion.string.not.starts.with.ignore.case=no empieza con _ \(ignorando mayusculas\)
assertion.string.not.ends.with=no termina con _
assertion.string.not.ends.with.ignore.case=no termina con _ \(ignorando mayusculas\)
assertion.string.not.contains=no contiene _
assertion.string.not.contains.ignore.case=no contiene _ \(ignorando mayusculas\)

assertion.generic.not.null=no es nulo
assertion.generic.not.empty=no esta vacio
assertion.generic.not.null.empty=no es nulo ni vacio

# temporal positive assertions
assertion.temporal.equals=es (igual a) _
assertion.temporal.after=es posterior a _
assertion.temporal.before=es anterior a _
assertion.temporal.after.equals=es posterior o igual a _
assertion.temporal.before.equals=es anterior o igual a _

# temporal negative assertions
assertion.temporal.not.equals=no es (igual a) _
assertion.temporal.not.after=no es posterior a _
assertion.temporal.not.before=no es anterior a _
assertion.temporal.not.after.equals=no es posterior o igual a _
assertion.temporal.not.before.equals=no es anterior o igual a _
