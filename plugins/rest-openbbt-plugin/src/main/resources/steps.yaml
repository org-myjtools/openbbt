'rest.request.GET':
  role: when
  description: |
    Makes a GET request to the specified URL.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the GET request is made
  language:
    en:
      expression: 'I make a GET request to {endpoint:text}'
      example: |
        When I make a GET request to "users"
      scenarios:
        - title: Retrieve a collection of resources
          gherkin: |
            When I make a GET request to "users"
            Then the HTTP status code is equal to 200
            And the response body contains:
            """json
            [{"id": 1, "name": "Alice"}]
            """
        - title: Retrieve a single resource by ID
          gherkin: |
            When I make a GET request to "users/1"
            Then the HTTP status code is equal to 200
        - title: Request a non-existent resource
          gherkin: |
            When I make a GET request to "users/9999"
            Then the HTTP status code is equal to 404
    es:
      expression: 'hago una petición GET a {endpoint:text}'
      example: |
        Cuando hago una petición GET a "users"
      scenarios:
        - title: Obtener una colección de recursos
          gherkin: |
            Cuando hago una petición GET a "users"
            Entonces el código de estado HTTP es igual a 200
            Y el cuerpo de la respuesta contiene:
            """json
            [{"id": 1, "name": "Alice"}]
            """
        - title: Obtener un recurso por ID
          gherkin: |
            Cuando hago una petición GET a "users/1"
            Entonces el código de estado HTTP es igual a 200


