'rest.request.GET':
  role: when
  description: |
    Makes a GET request to the specified URL.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the GET request is made


'rest.request.POST.empty':
  role: when
  description: |
    Makes a POST request to the specified URL with an empty body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made


'rest.request.POST.body':
  role: when
  description: |
    Makes a POST request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
  additional-data: |
    The body of the POST request, provided as a multi-line text input.


'rest.request.POST.file':
  role: when
  description: |
    Makes a POST request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
    - name: file
      type: text
      description: The path to the file containing the body of the POST request


'rest.request.PUT.body':
  role: when
  description: |
    Makes a PUT request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PUT request is made
  additional-data: |
    The body of the PUT request, provided as a multi-line text input.


'rest.request.PUT.file':
  role: when
  description: |
    Makes a PUT request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PUT request is made
    - name: file
      type: text
      description: The path to the file containing the body of the PUT request


'rest.request.PATCH.body':
  role: when
  description: |
    Makes a PATCH request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PATCH request is made
  additional-data: |
    The body of the PATCH request, provided as a multi-line text input.


'rest.request.PATCH.file':
  role: when
  description: |
    Makes a PATCH request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
