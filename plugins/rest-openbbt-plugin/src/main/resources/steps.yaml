'rest.response.statusCode':
  role: then
  description: |
    Asserts that the status code of the last REST response matches the expected value.
  language:
    en:
      expression: 'the HTTP status code {{integer-assertion}}'
      assertion-hints:
        - 'is equal to 200'
        - 'is equal to 201'
        - 'is equal to 204'
        - 'is equal to 400'
        - 'is equal to 401'
        - 'is equal to 403'
        - 'is equal to 404'
        - 'is not equal to 500'
        - 'is greater than 199'
        - 'is less than 300'
        - 'is between 200 and 299'
      example: |
        Then the HTTP status code is equal to 200
      scenarios:
        - title: Verify a successful GET response
          gherkin: |
            When I make a GET request to "users"
            Then the HTTP status code is equal to 200
        - title: Verify a resource was created
          gherkin: |
            When I make a POST request to "users" with body:
            """json
            {"name": "Alice"}
            """
            Then the HTTP status code is equal to 201
        - title: Verify a successful deletion
          gherkin: |
            When I make a DELETE request to "users/1"
            Then the HTTP status code is equal to 204
        - title: Verify an error response
          gherkin: |
            When I make a GET request to "users/9999"
            Then the HTTP status code is equal to 404
    es:
      expression: 'el código de estado HTTP {{integer-assertion}}'
      assertion-hints:
        - 'es igual a 200'
        - 'es igual a 201'
        - 'es igual a 204'
        - 'es igual a 404'
        - 'es mayor que 199'
        - 'es menor que 300'
        - 'está entre 200 y 299'
      example: |
        Entonces el código de estado HTTP es igual a 200
      scenarios:
        - title: Verificar una respuesta exitosa
          gherkin: |
            Cuando hago una petición GET a "users"
            Entonces el código de estado HTTP es igual a 200


'rest.response.body':
  role: then
  description: |
    Asserts that the body of the last REST response matches exactly the expected value.
  additional-data: |
    The expected body of the response, provided as a multi-line text input.
  language:
    en:
      expression: 'the response body is:'
      example: |
        Then the response body is:
        """json
        {
          "id": 123,
          "name": "John",
          "age": 30
        }
        """
      scenarios:
        - title: Verify exact response body after a GET
          gherkin: |
            When I make a GET request to "users/1"
            Then the HTTP status code is equal to 200
            And the response body is:
            """json
            {"id": 1, "name": "Alice", "age": 25}
            """
        - title: Verify exact response body after a POST
          gherkin: |
            When I make a POST request to "users" with body:
            """json
            {"name": "Bob", "age": 22}
            """
            Then the HTTP status code is equal to 201
            And the response body is:
            """json
            {"id": 2, "name": "Bob", "age": 22}
            """
    es:
      expression: 'el cuerpo de la respuesta es:'
      example: |
        Entonces el cuerpo de la respuesta es:
        """json
        {
          "id": 123,
          "name": "John",
          "age": 30
        }
        """
      scenarios:
        - title: Verificar el cuerpo exacto tras un GET
          gherkin: |
            Cuando hago una petición GET a "users/1"
            Entonces el código de estado HTTP es igual a 200
            Y el cuerpo de la respuesta es:
            """json
            {"id": 1, "name": "Alice", "age": 25}
            """


'rest.response.body.file':
  role: then
  description: |
    Asserts that the body of the last REST response matches exactly the expected value read from a file.
  parameters:
    - name: file
      type: text
      description: The path to the file containing the expected body of the response
  language:
    en:
      expression: 'the response body is the content of file {file:text}'
