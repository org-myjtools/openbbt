'rest.request.POST.body':
  role: when
  description: |
    Makes a POST request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
  additional-data: |
    The body of the POST request, provided as a multi-line text input.
  language:
    en:
      expression: 'I make a POST request to {endpoint:text} with body:'
      example: |
        When I make a POST request to "users" with body:
        """json
        {
          "name": "John",
          "age": 30
        }
        """
      scenarios:
        - title: Create a new resource successfully
          gherkin: |
            When I make a POST request to "users" with body:
            """json
            {"name": "John", "age": 30}
            """
            Then the HTTP status code is equal to 201
            And the response body contains:
            """json
            {"name": "John"}
            """
        - title: Reject a request with invalid data
          gherkin: |
            When I make a POST request to "users" with body:
            """json
            {"name": ""}
            """
            Then the HTTP status code is equal to 400
    es:
      expression: 'hago una petición POST a {endpoint:text} con el cuerpo:'
      example: |
        Cuando hago una petición POST a "users" con el cuerpo:
        """json
        {
          "name": "John",
          "age": 30
        }
        """
      scenarios:
        - title: Crear un recurso correctamente
          gherkin: |
            Cuando hago una petición POST a "users" con el cuerpo:
            """json
            {"name": "John", "age": 30}
            """
            Entonces el código de estado HTTP es igual a 201
        - title: Rechazar una petición con datos inválidos
          gherkin: |
            Cuando hago una petición POST a "users" con el cuerpo:
            """json
            {"name": ""}
            """
            Entonces el código de estado HTTP es igual a 400


