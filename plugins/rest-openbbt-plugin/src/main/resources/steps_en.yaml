'rest.request.DELETE':
  expression: 'I make a DELETE request to {endpoint:text}'
  example: |
    When I make a DELETE request to "users/123"
  scenarios:
    - title: Delete an existing resource
      gherkin: |
        When I make a DELETE request to "users/1"
        Then the HTTP status code is equal to 204
    - title: Delete a non-existent resource
      gherkin: |
        When I make a DELETE request to "users/9999"
