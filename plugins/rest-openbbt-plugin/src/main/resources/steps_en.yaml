'rest.request.GET':
  expression: 'I make a GET request to {endpoint:text}'
  example: |
    When I make a GET request to "users"
  scenarios:
    - title: Retrieve a collection of resources
      gherkin: |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        [{"id": 1, "name": "Alice"}]
        """
    - title: Retrieve a single resource by ID
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
    - title: Request a non-existent resource
      gherkin: |
        When I make a GET request to "users/9999"
        Then the HTTP status code is equal to 404


'rest.request.POST.empty':
  expression: 'I make a POST request to {endpoint:text}'
  example: |
    When I make a POST request to "users"
  scenarios:
    - title: Trigger an action with no payload
      gherkin: |
        When I make a POST request to "sessions/logout"
        Then the HTTP status code is equal to 204


'rest.request.POST.body':
  expression: 'I make a POST request to {endpoint:text} with body:'
  example: |
    When I make a POST request to "users" with body:
    """json
    {
      "name": "John",
      "age": 30
    }
    """
  scenarios:
    - title: Create a new resource successfully
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "John", "age": 30}
        """
        Then the HTTP status code is equal to 201
        And the response body contains:
        """json
        {"name": "John"}
        """
    - title: Reject a request with invalid data
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": ""}
        """
        Then the HTTP status code is equal to 400


'rest.request.POST.file':
  expression: 'I make a POST request to {endpoint:text} with body from file {file:text}'
  example: |
    When I make a POST request to "users" with body from file "user_data.json"
  scenarios:
    - title: Create a resource using a body from file
      gherkin: |
        When I make a POST request to "users" with body from file "fixtures/new_user.json"
        Then the HTTP status code is equal to 201


'rest.request.PUT.body':
  expression: 'I make a PUT request to {endpoint:text} with body:'
  example: |
    When I make a PUT request to "users/123" with body:
    """json
    {
      "name": "John",
      "age": 31
    }
    """
  scenarios:
    - title: Replace a resource completely
      gherkin: |
        When I make a PUT request to "users/1" with body:
        """json
        {"name": "John Updated", "age": 31}
        """
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        {"name": "John Updated"}
        """
    - title: Replace a non-existent resource
      gherkin: |
        When I make a PUT request to "users/9999" with body:
        """json
        {"name": "Ghost"}
        """
        Then the HTTP status code is equal to 404


'rest.request.PUT.file':
  expression: 'I make a PUT request to {endpoint:text} with body from file {file:text}'
  example: |
    When I make a PUT request to "users/123" with body from file "updated_user_data.json"
  scenarios:
    - title: Replace a resource using a body from file
      gherkin: |
        When I make a PUT request to "users/1" with body from file "fixtures/updated_user.json"
