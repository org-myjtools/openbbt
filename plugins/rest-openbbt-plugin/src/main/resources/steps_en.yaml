'rest.response.statusCode':
  expression: 'the HTTP status code {{integer-assertion}}'
  assertion-hints:
    - 'is equal to 200'
    - 'is equal to 201'
    - 'is equal to 204'
    - 'is equal to 400'
    - 'is equal to 401'
    - 'is equal to 403'
    - 'is equal to 404'
    - 'is not equal to 500'
    - 'is greater than 199'
    - 'is less than 300'
    - 'is between 200 and 299'
  example: |
    Then the HTTP status code is equal to 200
  scenarios:
    - title: Verify a successful GET response
      gherkin: |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
    - title: Verify a resource was created
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Alice"}
        """
        Then the HTTP status code is equal to 201
    - title: Verify a successful deletion
      gherkin: |
        When I make a DELETE request to "users/1"
        Then the HTTP status code is equal to 204
    - title: Verify an error response
      gherkin: |
        When I make a GET request to "users/9999"
        Then the HTTP status code is equal to 404


'rest.response.body':
  expression: 'the response body is:'
  example: |
    Then the response body is:
    """json
    {
      "id": 123,
      "name": "John",
      "age": 30
    }
    """
  scenarios:
    - title: Verify exact response body after a GET
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body is:
        """json
        {"id": 1, "name": "Alice", "age": 25}
        """
    - title: Verify exact response body after a POST
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Bob", "age": 22}
        """
        Then the HTTP status code is equal to 201
        And the response body is:
        """json
        {"id": 2, "name": "Bob", "age": 22}
        """


'rest.response.body.file':
  expression: 'the response body is the content of file {file:text}'
  example: |
    Then the response body is the content of file "expected_response.json"
  scenarios:
    - title: Verify response body matches a reference file
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body is the content of file "fixtures/expected_user.json"


'rest.response.body.contains':
  expression: 'the response body contains:'
  example: |
    Then the response body contains:
    """json
    {
      "id": 123,
      "name": "John"
    }
    """
  scenarios:
    - title: Verify a field is present in the response after a GET
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        {"name": "Alice"}
        """
    - title: Verify a new resource appears in a collection
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Carol"}
        """
        Then the HTTP status code is equal to 201
        And the response body contains:
        """json
        {"name": "Carol"}
        """


'rest.response.extracts.field':
  expression: 'I store the value of field {field:text} from the response body into variable {variable:id}'
  example: |
    Then I store the value of field "id" from the response body into variable "userId"
  scenarios:
    - title: Store a field and use it in a subsequent request
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Carol"}
        """
        Then I store the value of field "id" from the response body into variable "newUserId"
        And I make a GET request to "users/${newUserId}"
        Then the HTTP status code is equal to 200
    - title: Use a stored variable in a subsequent request
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And I store the value of field "id" from the response body into variable "existingUserId"
        And I make a GET request to "users/${existingUserId}"
        Then the HTTP status code is equal to 200